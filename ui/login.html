<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f4f6f3">
  <title>ورود | واژه‌یار IELTS</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body data-auth-mode="login">
  <main class="auth-page">
    <section class="auth-panel" aria-labelledby="authTitle">
      <a class="brand" href="login.html"><span class="brand-mark">و</span><span><strong>واژه‌یار</strong><small>IELTS LEITNER</small></span></a>
      <div class="auth-copy"><h1 id="authTitle">خوش آمدی 👋</h1><p>برای ادامهٔ تمرین‌ها وارد حساب خودت شو.</p></div>
      <form class="auth-form" id="authForm" novalidate>
        <label class="auth-field" for="email">ایمیل<input id="email" name="email" type="email" inputmode="email" autocomplete="email" placeholder="name@example.com" required></label>
        <label class="auth-field" for="password">رمز عبور<input id="password" name="password" type="password" autocomplete="current-password" required></label>
        <p class="auth-message" id="authMessage" role="alert" aria-live="polite" hidden></p>
        <button class="auth-submit" id="authSubmit" type="submit"><span class="button-label">ورود به واژه‌یار</span></button>
      </form>
      <p class="auth-switch">هنوز حساب نداری؟ <a href="register.html">ثبت‌نام کن</a></p>
    </section>
    <aside class="auth-visual" aria-hidden="true"><div class="visual-content"><span>تمرین هوشمند و پیوسته</span><h2>هر روز چند واژه، یک قدم نزدیک‌تر به IELTS</h2><p>پیشرفت، خطاها و برنامهٔ مرور تو در حسابت ذخیره می‌شود.</p></div></aside>
  </main>
  <script src="auth.js"></script>
</body>
</html>
