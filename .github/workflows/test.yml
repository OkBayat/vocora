name: Test

on:
  pull_request:
  push:
    branches:
      - main
      - agent/**

permissions:
  contents: read

jobs:
  unit-and-browser:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [back, ui]
    defaults:
      run:
        working-directory: ${{ matrix.component }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.component }}/package-lock.json
      - run: npm ci
      - run: npm test

  docker-smoke:
    runs-on: ubuntu-latest
    env:
      DB_PASSWORD: ci-application-password
      DB_ADMIN_PASSWORD: ci-root-password
      MYSQL_ROOT_PASSWORD: ci-root-password
      JWT_SECRET: ci-only-secret-with-more-than-thirty-two-characters
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build and start the full stack
        run: |
          docker compose up --build --detach
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:3000/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      - name: Exercise authentication and database persistence
        run: |
          curl --fail --silent --show-error \
            --cookie-jar /tmp/leitner-cookies \
            --header 'Content-Type: application/json' \
            --data '{"email":"ci@example.com","password":"password123"}' \
            http://127.0.0.1:3000/api/auth/register \
            | jq -e '.user.email == "ci@example.com"'

          curl --fail --silent --show-error \
            --cookie /tmp/leitner-cookies \
            --request PUT \
            --header 'Content-Type: application/json' \
            --data '{"state":{"words":[{"term":"Monday","box":1}],"history":[]},"revision":0}' \
            http://127.0.0.1:3000/api/state \
            | jq -e '.state.words[0].term == "Monday" and .revision == 1'

          curl --fail --silent --show-error \
            --cookie /tmp/leitner-cookies \
            http://127.0.0.1:3000/api/state \
            | jq -e '.state.words[0].box == 1'
      - name: Print container logs after a failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop the stack
        if: always()
        run: docker compose down --volumes
